name: tag

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  actions: read
  attestations: none
  checks: none
  contents: read
  deployments: none
  id-token: none
  issues: none
  discussions: none
  packages: none
  pages: none
  pull-requests: read
  repository-projects: none
  security-events: none
  statuses: none

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: go.mod
          cache: false
      - run: |
          go test -gcflags="all=-N -l" -p 1 -v -timeout 30s ./...
        env:
          XDG_MUSIC_DIR: /tmp
  build:
    runs-on: ubuntu-latest
    needs: [test]
    if: success()
    environment:
      name: prod
      deployment: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: go.mod
          cache: false
      - run: |
          go mod download
          for os in linux darwin windows; do
            for arch in arm64 amd64; do
              fname="spotitube-${os}-${arch}"
              if test "${os}" = "windows"; then
                fname="${fname}.exe"
              fi
              echo "building $fname..."
              GOOS=$os GOARCH=$arch CGO_ENABLED=0 go build -ldflags="-s -w
                -X github.com/streambinder/spotitube/spotify.fallbackSpotifyID=$SPOTIFY_ID
                -X github.com/streambinder/spotitube/spotify.fallbackSpotifyKey=$SPOTIFY_KEY
                -X github.com/streambinder/spotitube/lyrics.fallbackGeniusToken=$GENIUS_TOKEN
              " -o "$fname"
            done
          done
        env:
          SPOTIFY_ID: ${{ secrets.SPOTIFY_ID }}
          SPOTIFY_KEY: ${{ secrets.SPOTIFY_KEY }}
          GENIUS_TOKEN: ${{ secrets.GENIUS_TOKEN }}
      - run: gh release create "$REF_NAME" ./spotitube-* --draft=false --prerelease=false
        env:
          REF_NAME: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.RELEASE_SPOTITUBE }}
  docker:
    runs-on: ubuntu-24.04-arm
    needs: [test]
    if: success()
    environment:
      name: prod
      deployment: false
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          secrets: |
            SPOTIFY_ID=${{ secrets.SPOTIFY_ID }}
            SPOTIFY_KEY=${{ secrets.SPOTIFY_KEY }}
            GENIUS_TOKEN=${{ secrets.GENIUS_TOKEN }}
          platforms: linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository }}:release
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          push: true
